<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Архивы | The Modern Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/main.js"></script>
    <script src="js/components.js"></script>
    <script src="js/catalog.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#F7FAFC] pb-20">
    
    <div id="app-header"></div>
    <div id="app-search"></div>

    <main class="pt-12 max-w-[1400px] mx-auto px-8 min-h-screen page-enter">
        <header class="mb-16">
            <h1 class="text-5xl md:text-6xl font-serif font-bold tracking-tight text-primary mb-4">Архивы</h1>
            <p class="text-academic-slate max-w-2xl font-light leading-relaxed">Глубокое погружение в исторические манускрипты, чертежи и оригинальные документы, недоступные широкой публике.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <aside class="lg:col-span-1 space-y-10">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-serif text-xl italic text-primary">Уточнить поиск</h2>
                    <button onclick="CatalogFilters.filterByCategory('all', document.getElementById('btn-all'))" class="text-[10px] font-bold uppercase tracking-widest text-gray-500 hover:text-primary transition-colors">Сбросить всё</button>
                </div>

                <section>
                    <h3 class="font-sans text-xs uppercase tracking-widest text-gray-500 font-bold mb-4">Тип документа</h3>
                    <div class="flex flex-wrap gap-2">
                        <button id="btn-all" onclick="CatalogFilters.filterByCategory('all', this)" class="filter-btn px-4 py-2 bg-primary text-white rounded-full text-xs cursor-pointer transition-colors">Все</button>
                        <button onclick="CatalogFilters.filterByCategory('blueprints', this)" class="filter-btn px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-xs cursor-pointer transition-colors hover:bg-gray-200">Чертежи</button>
                        <button onclick="CatalogFilters.filterByCategory('manuscripts', this)" class="filter-btn px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-xs cursor-pointer transition-colors hover:bg-gray-200">Манускрипты</button>
                    </div>
                </section>
            </aside>

            <div class="lg:col-span-3">
                <div class="flex justify-between items-center mb-8 border-b border-gray-200 pb-4">
                    <span class="text-sm text-gray-500">Показано <strong id="results-count" class="text-primary font-bold">2</strong> документа</span>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12">
                    
                    <a href="book_detail.html" class="catalog-item book-card block" data-category="blueprints">
                        <div class="aspect-[3/4] overflow-hidden bg-gray-100 mb-4 relative shadow-sm">
                            <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=800" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700">
                        </div>
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-serif text-lg font-bold text-primary group-hover:underline">Проект Баухауса #42</h3>
                        </div>
                        <p class="text-sm text-gray-500 mb-3">Оригинальные чертежи, 1928</p>
                    </a>

                    <a href="book_detail.html" class="catalog-item book-card block" data-category="manuscripts">
                        <div class="aspect-[3/4] overflow-hidden bg-gray-100 mb-4 relative shadow-sm">
                            <img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=800" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700">
                        </div>
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-serif text-lg font-bold text-primary group-hover:underline">Письма Модернизма</h3>
                        </div>
                        <p class="text-sm text-gray-500 mb-3">Переписка кураторов, 1950-е</p>
                    </a>

                </div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AppComponents.init('archives'); // Подсветит "Архивы" в шапке
        });
    </script>
</body>
</html>
