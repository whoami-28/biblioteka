<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Личный кабинет | The Modern Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/main.js"></script>
    <script src="js/components.js"></script>
    <script src="js/profile.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#F7FAFC] pb-20">

    <div id="app-header"></div>
    <div id="app-search"></div>

    <main class="pt-12 max-w-[1400px] mx-auto px-8 min-h-screen page-enter">
        
        <header class="mb-12">
            <h1 class="font-serif text-5xl md:text-6xl font-bold tracking-tight text-primary mb-4 italic">С возвращением, Джулиан.</h1>
        </header>

        <div class="flex space-x-8 border-b border-gray-200 mb-10">
            <button onclick="ProfileTabs.switchTab('tab-dashboard', this)" class="profile-nav-btn text-sm uppercase tracking-widest pb-4 border-b-2 text-primary border-primary font-bold transition-colors">
                Дашборд
            </button>
            <button onclick="ProfileTabs.switchTab('tab-settings', this)" class="profile-nav-btn text-sm uppercase tracking-widest pb-4 border-b-2 text-gray-400 border-transparent hover:text-primary transition-colors">
                Настройки
            </button>
        </div>

        <div id="tab-dashboard" class="profile-tab-content transition-opacity duration-300">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-10">
                <section class="md:col-span-7 bg-white p-8 shadow-sm border border-gray-100">
                    <h2 class="font-serif text-2xl font-bold mb-8 text-primary">Читаю сейчас</h2>
                    <a href="book_detail.html" class="flex gap-6 group block">
                        <div class="w-24 h-36 flex-shrink-0 overflow-hidden bg-gray-100">
                            <img src="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?w=300" class="w-full h-full object-cover grayscale transition-transform duration-700 group-hover:scale-105" alt="Book">
                        </div>
                        <div class="flex-1 py-2">
                            <span class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Том XIV • Теория архитектуры</span>
                            <h3 class="font-serif text-2xl mt-1 text-primary group-hover:underline">Архитектура Тишины</h3>
                            <div class="w-full bg-gray-100 h-1 overflow-hidden mt-6">
                                <div class="bg-primary h-full w-[64%]"></div>
                            </div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-2">Прочитано 64%</p>
                        </div>
                    </a>
                </section>

                <section class="md:col-span-5 flex flex-col gap-10">
                    <div class="bg-primary p-8 text-white flex items-center justify-between relative overflow-hidden shadow-editorial">
                        <div class="relative z-10">
                            <p class="text-[10px] uppercase tracking-[0.2em] opacity-60 mb-1 font-bold">Подписка</p>
                            <h3 class="text-3xl font-serif">Институциональный Архивариус</h3>
                            <button class="mt-6 border-b border-white/30 pb-1 text-[10px] uppercase tracking-widest font-bold hover:text-white/70 transition-colors">Управление подпиской</button>
                        </div>
                        <span class="material-symbols-outlined text-[120px] absolute -right-4 -bottom-4 opacity-10">account_balance</span>
                    </div>
                </section>
            </div>
        </div>

        <div id="tab-settings" class="profile-tab-content hidden transition-opacity duration-300">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-12">
                
                <div class="col-span-12 md:col-span-8 space-y-12">
                    
                    <section class="bg-white p-10 shadow-sm border border-gray-100">
                        <h2 class="font-serif text-2xl font-bold mb-8 text-primary">Персональные данные</h2>
                        
                        <div class="flex items-center gap-6 mb-10">
                            <div class="w-20 h-20 rounded-full bg-gray-200 overflow-hidden">
                                <span class="material-symbols-outlined w-full h-full flex items-center justify-center text-4xl text-gray-400">person</span>
                            </div>
                            <div>
                                <button class="border border-gray-200 px-6 py-2 text-[10px] font-bold uppercase tracking-widest text-primary hover:bg-gray-50 transition-colors">Изменить фото</button>
                                <p class="text-xs text-gray-400 mt-2 font-light">JPG, GIF или PNG. Максимум 2MB.</p>
                            </div>
                        </div>

                        <form class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-8">
                            <div class="flex flex-col gap-2">
                                <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400">Имя</label>
                                <input type="text" value="Джулиан" class="border-b border-gray-200 bg-transparent py-2 focus:border-primary outline-none text-primary transition-colors">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400">Фамилия</label>
                                <input type="text" value="Вэйн" class="border-b border-gray-200 bg-transparent py-2 focus:border-primary outline-none text-primary transition-colors">
                            </div>
                            <div class="flex flex-col gap-2 md:col-span-2">
                                <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400">Электронная почта</label>
                                <input type="email" value="j.vane@curator.com" class="border-b border-gray-200 bg-transparent py-2 focus:border-primary outline-none text-primary transition-colors">
                            </div>
                            <div class="flex flex-col gap-2 md:col-span-2">
                                <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400">Сфера интересов / Должность</label>
                                <input type="text" placeholder="Например: Историк архитектуры" value="Независимый исследователь" class="border-b border-gray-200 bg-transparent py-2 focus:border-primary outline-none text-primary transition-colors">
                            </div>
                        </form>
                    </section>

                    <section class="bg-white p-10 shadow-sm border border-gray-100">
                        <h2 class="font-serif text-2xl font-bold mb-8 text-primary">Безопасность</h2>
                        <form class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-8">
                            <div class="flex flex-col gap-2 md:col-span-2">
                                <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400">Текущий пароль</label>
                                <input type="password" placeholder="••••••••" class="border-b border-gray-200 bg-transparent py-2 focus:border-primary outline-none text-primary transition-colors font-mono">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400">Новый пароль</label>
                                <input type="password" placeholder="••••••••" class="border-b border-gray-200 bg-transparent py-2 focus:border-primary outline-none text-primary transition-colors font-mono">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400">Подтвердите пароль</label>
                                <input type="password" placeholder="••••••••" class="border-b border-gray-200 bg-transparent py-2 focus:border-primary outline-none text-primary transition-colors font-mono">
                            </div>
                        </form>
                    </section>
                </div>

                <div class="col-span-12 md:col-span-4 space-y-8">
                    
                    <section class="bg-white p-10 shadow-sm border border-gray-100 sticky top-12">
                        <h2 class="font-serif text-2xl font-bold mb-8 text-primary">Уведомления</h2>
                        
                        <div class="space-y-6">
                            <label class="flex items-start gap-4 cursor-pointer group">
                                <div class="mt-1 w-4 h-4 rounded-sm border-2 border-primary flex items-center justify-center bg-primary transition-colors">
                                    <span class="material-symbols-outlined text-white text-[12px] font-bold">check</span>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-primary group-hover:text-gray-600 transition-colors">Кураторский вестник</p>
                                    <p class="text-xs text-gray-400 font-light mt-1">Ежемесячная рассылка с новыми архивами и статьями.</p>
                                </div>
                            </label>
                            
                            <label class="flex items-start gap-4 cursor-pointer group">
                                <div class="mt-1 w-4 h-4 rounded-sm border-2 border-gray-300 flex items-center justify-center transition-colors group-hover:border-primary">
                                    <span class="material-symbols-outlined text-transparent text-[12px] font-bold">check</span>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-primary group-hover:text-gray-600 transition-colors">Архивные оповещения</p>
                                    <p class="text-xs text-gray-400 font-light mt-1">Немедленные уведомления о редких поступлениях в вашей сфере.</p>
                                </div>
                            </label>

                            <label class="flex items-start gap-4 cursor-pointer group">
                                <div class="mt-1 w-4 h-4 rounded-sm border-2 border-primary flex items-center justify-center bg-primary transition-colors">
                                    <span class="material-symbols-outlined text-white text-[12px] font-bold">check</span>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-primary group-hover:text-gray-600 transition-colors">Статус заказов</p>
                                    <p class="text-xs text-gray-400 font-light mt-1">Информация об отправке и доставке физических копий.</p>
                                </div>
                            </label>
                        </div>

                        <div class="pt-8 mt-8 border-t border-gray-100">
                            <button type="button" class="w-full bg-primary text-white px-8 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-[#1A202C] transition-colors shadow-sm">
                                Сохранить изменения
                            </button>
                        </div>
                    </section>
                </div>

            </div>
        </div>

    </main>

    <div id="app-footer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AppComponents.init('profile');
        });
    </script>
</body>
</html>
