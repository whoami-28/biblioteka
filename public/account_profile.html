<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Личный кабинет | The Modern Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#F7FAFC]">

    <div id="app-header"></div>

    <main class="pt-12 max-w-[1400px] mx-auto px-8 min-h-screen page-enter">
        <div class="grid grid-cols-12 gap-12 mt-8">
            
            <div class="col-span-12 lg:col-span-4">
                <div class="bg-white p-10 shadow-sm border border-gray-100 sticky top-24">
                    <div class="flex items-center gap-6 mb-8">
                        <div class="w-20 h-20 bg-gray-100 rounded-full overflow-hidden flex-shrink-0">
                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&q=80" alt="Avatar" class="w-full h-full object-cover grayscale">
                        </div>
                        <div>
                            <h2 id="profile-name" class="font-serif font-bold text-2xl text-primary mb-1">Загрузка...</h2>
                            <p id="profile-email" class="text-sm text-gray-500">Загрузка данных...</p>
                        </div>
                    </div>
                    
                    <div class="space-y-1 mb-10">
                        <div class="flex justify-between py-3 border-b border-gray-100">
                            <span class="text-xs uppercase tracking-widest font-bold text-gray-400">Статус</span>
                            <span class="text-xs font-bold text-primary">Куратор</span>
                        </div>
                        <div class="flex justify-between py-3 border-b border-gray-100">
                            <span class="text-xs uppercase tracking-widest font-bold text-gray-400">В коллекции</span>
                            <span class="text-xs font-bold text-primary" id="collection-count">0</span>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <a href="#" class="block w-full px-6 py-4 bg-gray-50 text-xs font-bold uppercase tracking-widest text-primary text-center hover:bg-gray-100 transition-colors">Настройки профиля</a>
                        <button id="logout-btn" class="block w-full px-6 py-4 bg-white border border-red-100 text-xs font-bold uppercase tracking-widest text-red-500 text-center hover:bg-red-50 transition-colors">Выйти из аккаунта</button>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-8">
                <h1 class="text-4xl md:text-5xl font-serif font-bold mb-12 text-primary tracking-tight">Ваша коллекция</h1>
                
                <div class="bg-white shadow-sm border border-gray-100 overflow-hidden">
                    <div class="px-8 py-6 border-b border-gray-100 bg-gray-50">
                        <h3 class="text-xs uppercase tracking-widest font-bold text-gray-500">История приобретений</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr>
                                    <th class="py-4 px-8 text-[10px] uppercase tracking-widest font-bold text-gray-400">Номер заказа</th>
                                    <th class="py-4 px-8 text-[10px] uppercase tracking-widest font-bold text-gray-400">Дата</th>
                                    <th class="py-4 px-8 text-[10px] uppercase tracking-widest font-bold text-gray-400">Статус</th>
                                    <th class="py-4 px-8 text-[10px] uppercase tracking-widest font-bold text-gray-400 text-right">Сумма</th>
                                </tr>
                            </thead>
                            <tbody id="orders-container" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="js/main.js"></script>
    <script src="js/components.js"></script>
    <script src="js/profile.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof AppComponents !== 'undefined') AppComponents.init();
        });
    </script>
</body>
</html>
