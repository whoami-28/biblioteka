<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Результаты поиска | The Modern Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/main.js"></script>
    <script src="js/components.js"></script>
    <script src="js/search.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#F7FAFC] flex flex-col min-h-screen">

    <div id="app-header"></div>
    <div id="app-search"></div>

    <main class="pt-12 max-w-[1400px] mx-auto px-8 min-h-screen page-enter flex-grow w-full">
        <header class="mb-16">
            <h1 class="text-5xl md:text-7xl font-serif font-bold tracking-tight text-primary mb-6">Результаты поиска</h1>
            <div class="flex items-baseline space-x-3 mb-8">
                <span class="text-gray-500 font-light">Показаны результаты для</span>
                <span id="search-query-display" class="text-2xl font-serif italic text-primary">"..."</span>
            </div>
        </header>

        <section class="grid grid-cols-12 gap-12">
            <aside class="col-span-12 md:col-span-3">
                <h3 class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-6">Статистика</h3>
                <ul class="space-y-4">
                    <li><div class="text-sm flex justify-between text-gray-500 font-bold">Всего найдено <span id="count-all">0</span></div></li>
                    <li><div class="text-sm flex justify-between text-gray-500 font-light">Книги <span id="count-books">0</span></div></li>
                    <li><div class="text-sm flex justify-between text-gray-500 font-light">Архивы <span id="count-archives">0</span></div></li>
                    <li><div class="text-sm flex justify-between text-gray-500 font-light">Подборки <span id="count-curations">0</span></div></li>
                </ul>
            </aside>
            
            <div class="col-span-12 md:col-span-9" id="results-wrapper">
                <div id="section-books" class="mb-20 hidden">
                    <div class="flex justify-between items-end mb-8 border-b border-gray-200 pb-4">
                        <h2 class="text-3xl font-serif italic text-primary">Книги</h2>
                        <a class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-primary transition-colors" href="catalog.html">В каталог</a>
                    </div>
                    <div id="search-books-container" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
                </div>

                <div id="section-archives" class="mb-20 hidden">
                    <div class="flex justify-between items-end mb-8 border-b border-gray-200 pb-4">
                        <h2 class="text-3xl font-serif italic text-primary">Архивы</h2>
                    </div>
                    <div id="search-archives-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </div>

                <div id="section-curations" class="mb-20 hidden">
                    <div class="flex justify-between items-end mb-8 border-b border-gray-200 pb-4">
                        <h2 class="text-3xl font-serif italic text-primary">Подборки</h2>
                    </div>
                    <div id="search-curations-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </div>
                
                <div id="no-results-msg" class="hidden text-center py-20">
                    <span class="material-symbols-outlined text-6xl text-gray-300 mb-4">search_off</span>
                    <h3 class="text-2xl font-serif font-bold text-primary">Ничего не найдено</h3>
                    <p class="text-gray-500 mt-2">Попробуйте изменить запрос или поискать по другим ключевым словам.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="app-footer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof AppComponents !== 'undefined') AppComponents.init();
        });
    </script>
</body>
</html>
